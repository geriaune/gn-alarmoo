esphome:
  name: paradox
  friendly_name: paradox

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

packages:
  tailscale:
    url: https://github.com/Csontikka/esphome-tailscale
    ref: main
    files: [packages/tailscale/tailscale.yaml]
    refresh: 0s

tailscale:
  auth_key: !secret tailscale_auth_key  # set this in ESPHome App SECRETS, generate it in tailscale/headscale server
  hostname: "paradox"
#  uncomment below config line for headscale self-hosted server, not required for tailscale setup
#  login_server: "http://vpn.yourhost.com:8080"

# Enable logging
logger:
  level: INFO

# Enable Home Assistant API
api:
  encryption:
    key: "xxxxxxxxxxxxxxxxxxxxx" # generated by ESPHome while adding a device

ota:
  - platform: esphome
    password: "xxxxxxxxxxxxxxxxxxxxx" # generated by ESPHome while adding a device

wifi:
  ssid: !secret wifi_ssid           # change this to your wifi SSID or use fallback AP for wifi settings
  password: !secret wifi_password   # change this to your wifi password or use fallback AP for wifi settings
#  use_address: "100.64.0.X"        # set this AFTER you flash the ESP and connect to the VPN

#  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Paradox Fallback Hotspot"
    password: "xxxxxxxxxxxxxxxxxxxxx" # random password for fallback AP

captive_portal:

time:
  - platform: homeassistant
    id: homeassistant_time

external_components:
  - source: github://oxan/esphome-stream-server

uart:
  - id: paradox_uart
    tx_pin: 15    # change this if you are using anything other than geriaune.pro built module and using a different GPIO for TX
    rx_pin: 7     # change this if you are using anything other than geriaune.pro built module and using a different GPIO for RX
    baud_rate: 9600

stream_server:
  uart_id: paradox_uart
  port: 10000

binary_sensor:
  - platform: stream_server
    connected:
      name: Paradox UART

sensor:
  - platform: stream_server
    connection_count:
      name: Number of UART connections

    # WiFi Signal sensor.
  - platform: wifi_signal
    name: WiFi Signal
    update_interval: 60s

  - platform: uptime
    id: uptime_seconds
    internal: true
    update_interval: 60s

  - platform: template
    name: "Last Restart"
    device_class: timestamp
    entity_category: diagnostic
    lambda: |-
      static float boot_timestamp = 0.0f;
      
      if (boot_timestamp == 0.0f) {
        auto now = id(homeassistant_time).now();
        if (now.is_valid()) {
          boot_timestamp = now.timestamp - id(uptime_seconds).state;
        }
      }
      
      return boot_timestamp;
